<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiswaPKL Pro - Dashboard Administrasi PKL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', ui-sans-serif, system-ui, sans-serif;
            background-color: #FFFFFF;
        }
        
        .font-display {
            font-family: 'Quicksand', sans-serif;
        }
        
        @keyframes pulse-custom {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .animate-pulse-custom {
            animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .glass-card {
            background: white;
            border: 1px solid #E8EDF2;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }
        
        .upload-zone {
            border: 2px dashed #E2E8F0;
            transition: all 0.2s ease;
            cursor: pointer;
            background: #FAFCFE;
        }
        
        .upload-zone:hover {
            border-color: #003056;
            background-color: #F5F8FC;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #F1F5F9;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }

        .btn-primary {
            background-color: #003056;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background-color: #002543;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 48, 86, 0.15);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .text-primary {
            color: #003056;
        }
        
        .border-primary {
            border-color: #003056;
        }
        
        .bg-primary {
            background-color: #003056;
        }
        
        .bg-primary-light {
            background-color: #F0F4F9;
        }
        
        /* Uploaded card style - solid biru tua tanpa gradasi */
        .uploaded-card {
            background-color: #003056;
            border: 1px solid #003056;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icon components
        const FileText = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
        const ShieldCheck = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#003056" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>;
        const Stethoscope = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#003056" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2.2a.3.3 0 0 0-.2.1z"/><path d="M11 2.2a.3.3 0 1 0 .3.3.3.3 0 0 0-.3-.3z"/><path d="M7 2.2a.3.3 0 1 0 .3.3.3.3 0 0 0-.3-.3z"/><path d="M4.8 2.3A.3.3 0 1 0 5 2.2a.3.3 0 0 0-.2.1z"/><path d="M11 2.2a.3.3 0 1 0 .3.3.3.3 0 0 0-.3-.3z"/><path d="M7 2.2a.3.3 0 1 0 .3.3.3.3 0 0 0-.3-.3z"/><path d="M2 12h1"/><path d="M18 12h1"/><path d="M12 2v1"/><path d="M12 21v1"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8l-.7.7"/><path d="M7.8 7.8l.7.7"/><path d="M7.8 16.2l.7-.7"/><path d="M16.2 16.2l-.7-.7"/><circle cx="18" cy="18" r="2"/><path d="M18 14v2"/><path d="M18 20v2"/></svg>;
        const CreditCard = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#003056" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>;
        const Upload = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const Info = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#003056" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;

        function App() {
            const [documents, setDocuments] = useState([
                { id: 'ktp_kia', name: 'Fotocopy KTP / KIA', description: 'Identitas diri resmi untuk keperluan asuransi dan administrasi industri.', status: 'uploaded' },
                { id: 'surat_sehat', name: 'Surat Keterangan Sehat', description: 'Dikeluarkan oleh UKS atau Puskesmas setempat.', status: 'empty' },
                { id: 'kartu_bpjs', name: 'Kartu BPJS Ketenagakerjaan', description: 'Syarat wajib perlindungan keselamatan kerja selama PKL.', status: 'empty' },
            ]);

            const stats = {
                total: documents.length,
                completed: documents.filter(d => d.status === 'uploaded').length,
            };

            const progress = (stats.completed / stats.total) * 100;
            const isComplete = stats.completed === stats.total;

            const handleUpload = (id) => {
                setDocuments(prev => prev.map(doc => doc.id === id ? { ...doc, status: 'uploaded' } : doc));
            };

            const getIcon = (id) => {
                if (id === 'ktp_kia') return <CreditCard />;
                if (id === 'surat_sehat') return <Stethoscope />;
                return <ShieldCheck />;
            };

            return (
                <div className="min-h-screen bg-white text-[#1E293B] font-sans">
                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0">
                        {/* Content Body */}
                        <div className="p-6 lg:p-10 max-w-6xl mx-auto w-full space-y-8 lg:space-y-10 overflow-y-auto">
                            {/* Welcome & Info */}
                            <section className="flex flex-col md:flex-row md:items-start justify-between gap-6">
                                <div className="flex-1">
                                    <span className="px-3 py-1 bg-red-50 border border-red-200 text-red-700 rounded-lg text-[10px] font-bold tracking-widest uppercase mb-3 inline-flex items-center gap-2 shadow-sm">
                                        <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse-custom"></span>
                                        Status: Belum Lengkap
                                    </span>
                                    <h2 className="text-2xl lg:text-3xl font-bold font-display text-[#003056] tracking-tight mt-1">Data Kelengkapan Berkas</h2>
                                    <p className="text-[#64748B] mt-2 max-w-lg font-medium">Pastikan dokumen asli telah discan dengan jelas sebelum mengunggah ke sistem.</p>
                                </div>
                                
                                <div className="bg-[#003056] p-5 rounded-2xl text-white shadow-lg min-w-[200px]">
                                    <p className="text-[10px] uppercase font-bold opacity-80 mb-1 tracking-widest">Progress Berkas</p>
                                    <p className="text-sm font-bold flex items-center gap-2">
                                        {isComplete ? 'Selesai Dikumpulkan' : `Sisa ${stats.total - stats.completed} Berkas Lagi`}
                                    </p>
                                    <div className="w-full bg-white/30 h-2 mt-4 rounded-full overflow-hidden shadow-inner">
                                        <div className="bg-white h-full shadow-sm transition-all duration-1000 ease-out" style={{ width: `${progress}%` }}></div>
                                    </div>
                                    <p className="text-[10px] text-right mt-2 font-bold opacity-80">{stats.completed}/{stats.total} Berkas Berhasil</p>
                                </div>
                            </section>

                            {/* Form Area */}
                            <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 lg:gap-8">
                                <div className="xl:col-span-2 space-y-6">
                                    <div className="glass-card p-6 lg:p-10 rounded-2xl">
                                        <div className="space-y-8">
                                            {documents.map((doc) => (
                                                <div key={doc.id}>
                                                    <label className="flex items-center justify-between mb-3">
                                                        <span className="text-sm font-bold text-[#003056] flex items-center gap-2">
                                                            <span className="opacity-70">{getIcon(doc.id)}</span>
                                                            {doc.name}
                                                        </span>
                                                        {doc.status === 'uploaded' && (
                                                            <span className="text-[#003056] font-bold text-[10px] uppercase tracking-wider flex items-center gap-1">
                                                                ✓ Sudah Diunggah
                                                            </span>
                                                        )}
                                                    </label>
                                                    
                                                    {doc.status === 'uploaded' ? (
                                                        <div className="uploaded-card flex items-center gap-4 p-4 rounded-2xl shadow-md">
                                                            <div className="bg-white/20 p-2 rounded-xl">
                                                                <FileText />
                                                            </div>
                                                            <div className="flex-1">
                                                                <p className="text-xs font-bold text-white font-display tracking-wide">{doc.id.toUpperCase()}_SCAN.pdf</p>
                                                                <p className="text-[10px] text-white/70 font-medium">Berhasil diverifikasi sistem</p>
                                                            </div>
                                                            <button onClick={() => setDocuments(prev => prev.map(d => d.id === doc.id ? {...d, status: 'empty'} : d))} className="text-[10px] font-bold text-white/80 hover:text-white underline uppercase tracking-tighter transition-colors">
                                                                Ganti
                                                            </button>
                                                        </div>
                                                    ) : (
                                                        <div className="upload-zone rounded-2xl p-6 lg:p-8 text-center group" onClick={() => handleUpload(doc.id)}>
                                                            <div className="mx-auto mb-3 text-[#94A3B8] group-hover:text-[#003056] transition-colors"><Upload /></div>
                                                            <p className="text-xs font-bold text-[#003056] uppercase tracking-wide">Pilih atau Seret File Berkas</p>
                                                            <p className="text-[10px] text-[#94A3B8] mt-1 font-semibold">Format PDF / JPG, Maks 2MB</p>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-white border border-[#E8EDF2] rounded-2xl p-6 lg:p-8 shadow-sm h-full flex flex-col">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-6 text-[#003056]">
                                                <Info />
                                                <h3 className="font-bold font-display uppercase text-xs tracking-widest">Ketentuan Unggah</h3>
                                            </div>
                                            <ul className="space-y-4">
                                                <li className="flex gap-3 items-start">
                                                    <span className="w-1.5 h-1.5 bg-[#003056] rounded-full mt-1.5 shrink-0"></span>
                                                    <p className="text-xs text-[#475569] leading-relaxed font-medium">Dokumen digital harus merupakan hasil scan (bukan foto) agar terbaca jelas.</p>
                                                </li>
                                                <li className="flex gap-3 items-start">
                                                    <span className="w-1.5 h-1.5 bg-[#003056] rounded-full mt-1.5 shrink-0"></span>
                                                    <p className="text-xs text-[#475569] leading-relaxed font-medium">Ukuran berkas dibatasi maksimal 2MB untuk efisiensi penyimpanan server.</p>
                                                </li>
                                                <li className="flex gap-3 items-start">
                                                    <span className="w-1.5 h-1.5 bg-[#003056] rounded-full mt-1.5 shrink-0"></span>
                                                    <p className="text-xs text-[#475569] leading-relaxed font-medium">Verifikasi manual oleh Hubin memerlukan waktu maksimal 2 hari kerja.</p>
                                                </li>
                                            </ul>
                                        </div>

                                        <div className="mt-10 pt-8 border-t border-[#E8EDF2]">
                                            <button disabled={!isComplete} className={`w-full py-4 rounded-2xl font-bold font-display transition-all shadow-sm active:scale-[0.98] ${
                                                isComplete 
                                                    ? 'btn-primary text-white' 
                                                    : 'bg-[#F1F5F9] text-[#94A3B8] cursor-not-allowed'
                                            }`}>
                                                Simpan Seluruh Progress
                                            </button>
                                            <p className="text-[10px] text-center text-[#94A3B8] mt-4 font-medium uppercase tracking-tighter">Terakhir diperbarui: 21 April 2026, 09:45</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
